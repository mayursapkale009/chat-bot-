<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Indian Language Chatbot</title>
    <meta name="description" content="An intelligent multilingual chatbot supporting Hindi, Bengali, Marathi, Tamil, Telugu, Kannada and English">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500&family=Noto+Sans+Tamil:wght@400;500&family=Noto+Sans+Telugu:wght@400;500&family=Noto+Sans+Kannada:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #06b6d4;
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --bg-card-2: #16213e;
            --bg-input: #1e1e3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2d2d5e;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --user-bubble: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --bot-bubble: linear-gradient(135deg, #1e293b 0%, #1a1a3e 100%);
            --glow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans Devanagari', 'Noto Sans Bengali', 'Noto Sans Tamil', 'Noto Sans Telugu', 'Noto Sans Kannada', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--glow);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar {
            width: 42px; height: 42px;
            background: var(--user-bubble);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .header-info h1 {
            font-size: 16px; font-weight: 600;
            background: linear-gradient(135deg, #e2e8f0, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-info .subtitle {
            font-size: 11px; color: var(--text-muted);
            display: flex; align-items: center; gap: 4px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header-right {
            display: flex; align-items: center; gap: 8px;
        }

        .lang-select {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .lang-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .btn-icon {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 34px; height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ===== CHAT AREA ===== */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ===== WELCOME MESSAGE ===== */
        .welcome {
            text-align: center;
            padding: 30px 20px;
            animation: fadeIn 0.6s ease;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .welcome h2 {
            font-size: 20px; font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #e2e8f0, #818cf8, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 13px;
            max-width: 400px;
            margin: 0 auto 20px;
            line-height: 1.5;
        }

        .lang-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .lang-badge {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.2s;
            cursor: pointer;
        }

        .lang-badge:hover {
            border-color: var(--primary);
            color: var(--primary-light);
            background: rgba(99, 102, 241, 0.1);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-width: 380px;
            margin: 0 auto;
        }

        .quick-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-btn:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .quick-btn .emoji { font-size: 16px; }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot { align-self: flex-start; }

        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .message.bot .msg-avatar {
            background: linear-gradient(135deg, #1e293b, #334155);
            border: 1px solid var(--border);
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.55;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .msg-bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .msg-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.user .msg-meta { justify-content: flex-end; }

        .intent-tag {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 500;
        }

        .lang-tag {
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
        }

        /* Speaker button for TTS */
        .tts-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            padding: 2px;
            transition: color 0.2s;
        }
        .tts-btn:hover { color: var(--primary-light); }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing span {
            width: 6px; height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: flex-end;
            padding: 4px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
        }

        #messageInput {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 8px 12px;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            line-height: 1.4;
        }

        #messageInput::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--user-bubble);
            border: none;
            width: 42px; height: 42px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .voice-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            width: 42px; height: 42px;
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .voice-btn:hover {
            border-color: var(--error);
            color: var(--error);
        }

        .voice-btn.recording {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--error);
            color: var(--error);
            animation: pulse 1s infinite;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header { padding: 10px 14px; }
            .header-info h1 { font-size: 14px; }
            .chat-container { padding: 12px; }
            .message { max-width: 92%; }
            .quick-actions { grid-template-columns: 1fr; }
            .welcome h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="bot-avatar">🤖</div>
            <div class="header-info">
                <h1>Multilingual Chatbot</h1>
                <div class="subtitle">
                    <span class="status-dot"></span>
                    <span id="statusText">Online • Powered by Ollama</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <select class="lang-select" id="langSelect" title="Preferred Language">
                <option value="auto">🌐 Auto</option>
                <option value="hi">🇮🇳 हिंदी</option>
                <option value="bn">🇮🇳 বাংলা</option>
                <option value="mr">🇮🇳 मराठी</option>
                <option value="ta">🇮🇳 தமிழ்</option>
                <option value="te">🇮🇳 తెలుగు</option>
                <option value="kn">🇮🇳 ಕನ್ನಡ</option>
                <option value="en">🇬🇧 English</option>
            </select>
            <button class="btn-icon" id="clearBtn" title="Clear Chat">🗑️</button>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-container" id="chatContainer">
        <!-- Welcome message -->
        <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">🌐</div>
            <h2>Multilingual Indian Language Chatbot</h2>
            <p>I can converse in multiple Indian languages. Type in any language and I'll respond naturally!</p>
            <div class="lang-badges">
                <span class="lang-badge" onclick="sendQuick('नमस्ते')">हिंदी</span>
                <span class="lang-badge" onclick="sendQuick('নমস্কার')">বাংলা</span>
                <span class="lang-badge" onclick="sendQuick('नमस्कार')">मराठी</span>
                <span class="lang-badge" onclick="sendQuick('வணக்கம்')">தமிழ்</span>
                <span class="lang-badge" onclick="sendQuick('నమస్కారం')">తెలుగు</span>
                <span class="lang-badge" onclick="sendQuick('ನಮಸ್ಕಾರ')">ಕನ್ನಡ</span>
                <span class="lang-badge" onclick="sendQuick('Hello')">English</span>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="sendQuick('तुम क्या कर सकते हो?')">
                    <span class="emoji">❓</span> क्या कर सकते हो?
                </button>
                <button class="quick-btn" onclick="sendQuick('भारत की राजधानी क्या है?')">
                    <span class="emoji">📚</span> सामान्य ज्ञान
                </button>
                <button class="quick-btn" onclick="sendQuick('इसे English में बताओ: मुझे खुशी है')">
                    <span class="emoji">🔄</span> अनुवाद करें
                </button>
                <button class="quick-btn" onclick="sendQuick('एक चुटकुला सुनाओ')">
                    <span class="emoji">😂</span> चुटकुला
                </button>
            </div>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="Type in any Indian language... किसी भी भाषा में लिखें..." autocomplete="off"></textarea>
        </div>
        <button class="voice-btn" id="voiceBtn" title="Voice Input">🎤</button>
        <button class="send-btn" id="sendBtn" title="Send Message">➤</button>
    </div>

    <script>
        // ============================================================
        // STATE
        // ============================================================
        const API_BASE = window.location.origin;
        let sessionId = null;
        let isProcessing = false;
        let messageCount = 0;

        // Elements
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const clearBtn = document.getElementById('clearBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const statusText = document.getElementById('statusText');

        // ============================================================
        // SESSION
        // ============================================================
        async function initSession() {
            try {
                const res = await fetch(`${API_BASE}/chat/session/start`, { method: 'POST' });
                const data = await res.json();
                sessionId = data.session_id;
            } catch (e) {
                console.error('Session init failed:', e);
                sessionId = 'local-' + Date.now();
            }
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        async function sendMessage(text) {
            if (!text.trim() || isProcessing) return;

            // Hide welcome screen
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }

            isProcessing = true;
            sendBtn.disabled = true;
            messageCount++;

            // Add user message
            addMessage(text, 'user');

            // Create bot message placeholder for streaming
            const botMsg = createBotBubble();
            const bubbleEl = botMsg.querySelector('.msg-bubble');
            const metaEl = botMsg.querySelector('.msg-meta');
            const startTime = Date.now();

            try {
                // Use SSE streaming endpoint for real-time token delivery
                const res = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let lastIntent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.token) {
                                    fullText += data.token;
                                    bubbleEl.textContent = fullText;
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                                if (data.intent) lastIntent = data.intent;
                            } catch (e) {}
                        }
                    }
                }

                // If streaming didn't work, fall back to normal endpoint
                if (!fullText) {
                    const res2 = await fetch(`${API_BASE}/chat/message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text, session_id: sessionId })
                    });
                    const data = await res2.json();
                    fullText = data.response;
                    lastIntent = data.intent;
                    bubbleEl.textContent = fullText;
                }

                // Update meta info
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                metaEl.innerHTML = `<span>${time}</span><span class="intent-tag">${lastIntent || 'chat'}</span><span style="color: var(--text-muted); font-size: 9px;">${elapsed}s</span>`;

            } catch (error) {
                bubbleEl.textContent = '⚠️ Connection error. Please make sure the server is running.';
                console.error('Chat error:', error);
            }

            isProcessing = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        function createBotBubble() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = `
                <div class="msg-avatar">🤖</div>
                <div class="msg-content">
                    <div class="msg-bubble" style="min-height: 20px;">⏳</div>
                    <div class="msg-meta"></div>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        function sendQuick(text) {
            messageInput.value = text;
            sendMessage(text);
            messageInput.value = '';
        }

        // ============================================================
        // ADD MESSAGES TO UI
        // ============================================================
        function addMessage(text, sender, meta = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            const avatar = sender === 'user' ? '👤' : '🤖';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let metaHtml = `<span>${time}</span>`;
            if (sender === 'bot' && meta.intent) {
                metaHtml += `<span class="intent-tag">${meta.intent}</span>`;
            }
            if (sender === 'bot' && meta.language) {
                const langNames = { hi: 'Hindi', bn: 'Bengali', mr: 'Marathi', ta: 'Tamil', te: 'Telugu', kn: 'Kannada', en: 'English' };
                metaHtml += `<span class="lang-tag">${langNames[meta.language] || meta.language}</span>`;
            }
            if (sender === 'bot' && meta.language) {
                metaHtml += `<button class="tts-btn" onclick="speakText(\`${text.replace(/`/g, "'")}\`, '${meta.language}')" title="Listen">🔊</button>`;
            }

            msgDiv.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-content">
                    <div class="msg-bubble">${escapeHtml(text)}</div>
                    <div class="msg-meta">${metaHtml}</div>
                </div>
            `;

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `
                <div class="msg-avatar">🤖</div>
                <div class="msg-content">
                    <div class="msg-bubble">
                        <div class="typing">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // TEXT-TO-SPEECH (TTS)
        // ============================================================
        async function speakText(text, language) {
            try {
                const res = await fetch(`${API_BASE}/voice/synthesize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, language })
                });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    audio.play();
                }
            } catch (e) {
                // Fallback to browser TTS
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = language === 'hi' ? 'hi-IN' : language === 'bn' ? 'bn-IN' : language === 'ta' ? 'ta-IN' : language === 'te' ? 'te-IN' : language === 'kn' ? 'kn-IN' : language === 'mr' ? 'mr-IN' : 'en-US';
                speechSynthesis.speak(utterance);
            }
        }

        // ============================================================
        // VOICE INPUT (STT)
        // ============================================================
        let recognition = null;
        let isRecording = false;

        function initVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                voiceBtn.style.display = 'none';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            const langSelect = document.getElementById('langSelect');
            const langMap = {
                'hi': 'hi-IN', 'bn': 'bn-IN', 'mr': 'mr-IN',
                'ta': 'ta-IN', 'te': 'te-IN', 'kn': 'kn-IN',
                'en': 'en-US', 'auto': 'hi-IN'
            };

            recognition.onstart = () => {
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceBtn.innerHTML = '⏹️';
                statusText.textContent = '🎤 Listening...';
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                messageInput.value = transcript;
            };

            recognition.onend = () => {
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '🎤';
                statusText.textContent = 'Online • Powered by Ollama';

                // Auto-send if we got text
                if (messageInput.value.trim()) {
                    sendMessage(messageInput.value.trim());
                    messageInput.value = '';
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '🎤';
                statusText.textContent = 'Online • Powered by Ollama';
            };

            voiceBtn.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop();
                } else {
                    recognition.lang = langMap[langSelect.value] || 'hi-IN';
                    recognition.start();
                }
            });
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) {
                sendMessage(text);
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        clearBtn.addEventListener('click', () => {
            chatContainer.innerHTML = '';
            if (welcomeScreen) {
                chatContainer.appendChild(welcomeScreen);
                welcomeScreen.style.display = 'block';
            }
            messageCount = 0;
            initSession();
        });

        // ============================================================
        // INIT
        // ============================================================
        initSession();
        initVoiceInput();
        messageInput.focus();
    </script>
</body>
</html>
